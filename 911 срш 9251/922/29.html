<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title></title>
    <style>
        * {
	box-sizing: border-box;
}
#parent {
	margin: 0 auto;
	width: 500px;
}

#form {
	display: flex;
	margin-bottom: 15px;
}
#form input {
	padding: 8px;
	width: 24%;
	margin: 0 0.5% 10px 0.5%;
}

h2 {
	margin-top: 0;
	margin-bottom: 7px;
}

#table {
	width: 100%;
	margin-bottom: 10px;
}
#table td, #table th {
	padding: 8px;
	text-align: center;
	border: 1px solid black;
}
#table td.remove {
	color: blue;
	cursor: pointer;
	text-decoration: underline;
}
#table td.remove:hover {
	text-decoration: none;
}

#result {
	text-align: right;
	margin-right: 10px;
}
    </style>
</head>
<body>
<input id="name" placeholder="название">
<input id="price" placeholder="цена">
<input id="amount" placeholder="количество">
<button id="add">Добавить покупку</button>

<table id="table">
    <thead>
        <tr>
            <th>Название</th>
            <th>Цена</th>
            <th>Кол-во</th>
            <th>Итого</th>
            <th>Действие</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<p>Общая сумма: <span id="total">0</span></p>
<script>
let name   = document.querySelector('#name');
let price  = document.querySelector('#price');
let amount = document.querySelector('#amount');
let add    = document.querySelector('#add');
let table  = document.querySelector('#table');
let total  = document.querySelector('#total');

function createCell(tr, value, className) {
	let td = document.createElement('td');
	td.textContent = value;
	td.classList.add(className);
	tr.appendChild(td);
	return td;
}

function recountTotal() {
	let costs = table.querySelectorAll('.cost');
	let sum = 0;
	for (let cost of costs) {
		sum += Number(cost.textContent);
	}
	total.textContent = sum;
}

function allowEdit(td) {
	td.addEventListener('dblclick', function() {
		let text = td.textContent;
		td.textContent = '';
		
		let input = document.createElement('input');
		input.value = text;
		td.appendChild(input);
		input.focus();
		
		input.addEventListener('keydown', function(event) {
			if (event.key == 'Enter') {
				td.textContent = this.value;
				
				if (td.classList.contains('price') || td.classList.contains('amount')) {
					let tr = td.parentElement;
					let priceVal = tr.querySelector('.price').textContent;
					let amountVal = tr.querySelector('.amount').textContent;
					
					tr.querySelector('.cost').textContent = priceVal * amountVal;
					recountTotal();
				}
			}
		});
	});
}

add.addEventListener('click', function() {
	let tr = document.createElement('tr');
	
	allowEdit(createCell(tr, name.value, 'name'));
	allowEdit(createCell(tr, price.value, 'price'));
	allowEdit(createCell(tr, amount.value, 'amount'));
	createCell(tr, price.value * amount.value, 'cost');
	
	createCell(tr, 'удалить', 'remove').addEventListener('click', function() {
		tr.remove();
		recountTotal();
	});
	
	table.appendChild(tr);
	recountTotal();
});

</script>
</body>
</html>
