<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>104</title>
<script>
        function findNOD() {
            let a = +document.getElementById('n1').value;
            let b = +document.getElementById('n2').value;
        
            for (let i = Math.min(a, b); i > 0; i--) {
                if (a % i === 0 && b % i === 0) {
                    document.getElementById('res').innerText = "НОД: " + i;
                    break; 
                }
            }
        }
</script>
</head>
<body>
    <input type="number" id="n1">
    <input type="number" id="n2">
    <button onclick="findNOD()">Найти НОД</button>
    <p id="res"></p>

</body>
</html>
