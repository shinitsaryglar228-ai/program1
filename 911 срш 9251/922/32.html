<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title></title>
    <style>
.right {
	border: 2px solid green;
	outline: none;
}
.wrong {
	border: 2px solid red;
	outline: none;
}
    </style>
</head>
<body>
<div id="test"></div>
<button id="button">проверить ответы</button>

<script>
let questions = [
	'Вопрос 1: Как называется столица Франции?',
	'Вопрос 2: Сколько лет живут люди в средем?',
	'Вопрос 3: Какое животное самое быстрое на суше?'
];

let answers = [
	'Париж',
	'70',
	'Гепард',
];

let testContainer = document.querySelector('#test');
let button = document.querySelector('#button');

for (let questionText of questions) {
	let div = document.createElement('div');
	
	let p = document.createElement('p');
	p.textContent = questionText;
	div.appendChild(p);
	
	let input = document.createElement('input');
	div.appendChild(input);
	
	testContainer.appendChild(div);
}

button.addEventListener('click', function() {
	let inputs = testContainer.querySelectorAll('input');
	
	inputs.forEach((input, index) => {
		let userAnswer = input.value.trim();
		let rightAnswer = answers[index];
		
		input.classList.remove('right', 'wrong');
		
		if (userAnswer === rightAnswer) {
			input.classList.add('right');
		} else {
			input.classList.add('wrong');
		}
	});
});

</script>
</body>
</html>
