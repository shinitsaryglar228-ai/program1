<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title></title>
    <style>
.right {
	border: 2px solid green;
	outline: none;
}
.wrong {
	border: 2px solid red;
	outline: none;
}
    </style>
</head>
<body>
<div id="test"></div>
<button id="button">проверить ответы</button>

<script>
let questions = [
	{
		text:  'Кто самый богатый в мире?',
		right: 'Илон Макс',
	},
	{
		text:  'Сколько минут в одном часе?',
		right: '60',
	},
	{
		text:  'Какая страна самая большая?',
		right: 'Россия',
	},
];

let testContainer = document.querySelector('#test');
let button = document.querySelector('#button');

questions.forEach(item => {
	let div = document.createElement('div');
	
	let p = document.createElement('p');
	p.textContent = item.text;
	div.appendChild(p);
	
	let input = document.createElement('input');
	div.appendChild(input);
	
	testContainer.appendChild(div);
});
button.addEventListener('click', function() {
	let inputs = testContainer.querySelectorAll('input');
	
	inputs.forEach((input, index) => {
		let userAnswer = input.value.trim();
		let rightAnswer = questions[index].right; 
		
		input.classList.remove('right', 'wrong');
		
		if (userAnswer === rightAnswer) {
			input.classList.add('right');
		} else {
			input.classList.add('wrong');
		}
	});
});

</script>
</body>
</html>
