<!DOCTYPE html>
<html>
<head>
    <style>
        td { width: 35px; height: 35px; border: 1px solid #333; cursor: pointer; text-align: center; }
        .hit { background-color: rgb(92, 252, 0); }
        .miss { background-color: #ff0000; }
        #timer { font-weight: bold; color: red; }
    </style>
</head>
<body>

    <h2>Успей найти 10 ячеек!</h2>
    <p>Времени осталось: <span id="timer">60</span> сек.</p>
    <p>Нужно найти: <span id="count">10</span></p>
    <table id="gameTable"></table>

    <script>
        let table = document.getElementById('gameTable');
        let countDisplay = document.getElementById('count');
        let timerDisplay = document.getElementById('timer');
        
        let secrets = [];
        let found = 0;
        let timeLeft = 60; 
        let gameActive = true;

        let timerId = setInterval(function() {
            timeLeft--;
            timerDisplay.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timerId);
                gameActive = false;
                alert('Время вышло! Вы проиграли.');
            }
        }, 1000);

        while (secrets.length < 10) {
            let num = Math.floor(Math.random() * 100) + 1;
            if (!secrets.includes(num)) secrets.push(num);
        }

        let k = 1;
        for (let i = 0; i < 10; i++) {
            let tr = document.createElement('tr');
            for (let j = 0; j < 10; j++) {
                let td = document.createElement('td');
                let cellNum = k++;

                td.addEventListener('click', function handler() {
                    if (!gameActive) return;

                    if (secrets.includes(cellNum)) {
                        this.classList.add('hit');
                        found++;
                        countDisplay.innerText = 10 - found;
                        this.removeEventListener('click', handler);
                    } else {
                        this.classList.add('miss');
                    }

                    if (found === 10) {
                        clearInterval(timerId);
                        gameActive = false;
                        alert('Победа! Вы успели!');
                    }
                });
                tr.appendChild(td);
            }
            table.appendChild(tr);
        }
    </script>
</body>
</html>
