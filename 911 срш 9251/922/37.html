<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title></title>
    <style>
#slider {
	width: 200px;
	height: 100px;
	border: 1px solid #ccc;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: 24px;
	font-family: sans-serif;
}

    </style>
</head>
<body>
<div id="slider"></div>
<script>
let texts = ['Текст 1', 'Текст 2', 'Текст 3'];
let slider = document.querySelector('#slider');

let i = 0;

slider.textContent = texts[i];

setInterval(function() {
	i++; 
	
	if (i >= texts.length) {
		i = 0;
	}
	
	slider.textContent = texts[i];
}, 1000);

</script>
</body>
</html>
