<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>104</title>
<script>
 function common() {
            let a = +document.getElementById('n1').value;
            let b = +document.getElementById('n2').value;
            let result = "";
            
            let min = Math.min(a, b);

            for (let i = 1; i <= min; i++) {
                if (a % i === 0 && b % i === 0) {
                    result += i + " "; 
                }
            }

            document.getElementById('res').innerText = result;
        }
</script>
</head>
<body>
<input type="number" id="n1">
    <input type="number" id="n2">
    <button onclick="common()">Общие делители</button>
    <p id="res"></p>

</body>
</html>
