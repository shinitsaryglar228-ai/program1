<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание №2 - Обновление информации</title>
    <style>
        #parent { text-align: center; }
        #calendar { display: inline-block; font-family: sans-serif; }
        #calendar td, #calendar th { padding: 10px; border: 1px solid black; text-align: center; width: 30px; height: 30px; }
        #calendar .nav, #calendar .info { text-align: center; }
        #calendar .info { font-weight: bold; font-size: 18px; margin-bottom: 10px; }
        #calendar a { color: blue; font-size: 25px; text-decoration: none; margin: 0 10px; }
        #calendar a:hover { color: red; }
    </style>
</head>
<body>

<div id="parent">
	<div id="calendar">
		<div class="info">Янв 2020</div>
		<table>
			<thead>
				<tr><th>пн</th><th>вт</th><th>ср</th><th>чт</th><th>пт</th><th>сб</th><th>вс</th></tr>
			</thead>
			<tbody class="body"></tbody>
		</table>
		<div class="nav">
			<a href="#" class="prev">←</a>
			<a href="#" class="next">→</a>
		</div>
	</div>
</div>

<script>

    function range(count) {
        var res = [];
        for (var i = 1; i <= count; i++) { res.push(i); }
        return res;
    }
    function getLastDay(year, month) {
        return new Date(year, month + 1, 0).getDate();
    }
    function getFirstWeekDay(year, month) {
        var date = new Date(year, month, 1);
        var day = date.getDay();
        if (day == 0) { return 6; } else { return day - 1; }
    }
    function getLastWeekDay(year, month) {
        var date = new Date(year, month + 1, 0);
        var day = date.getDay();
        if (day == 0) { return 6; } else { return day - 1; }
    }
    function normalize(arr, left, right) {
        for (var i = 0; i < left; i++) { arr.unshift(''); }
        for (var j = 0; j < right; j++) { arr.push(''); }
        return arr;
    }
    function chunk(arr, n) {
        var result = [];
        for (var i = 0; i < arr.length; i += n) { result.push(arr.slice(i, i + n)); }
        return result;
    }
    function createTable(parent, arr) {
        for (var i = 0; i < arr.length; i++) {
            var tr = document.createElement('tr');
            for (var j = 0; j < arr[i].length; j++) {
                var td = document.createElement('td');
                td.textContent = arr[i][j];
                tr.appendChild(td);
            }
            parent.appendChild(tr);
        }
    }

    function getNextMonth(month) {
        if (month == 11) { return 0; } else { return month + 1; }
    }
    function getNextYear(year, month) {
        if (month == 11) { return year + 1; } else { return year; }
    }
    function getPrevMonth(month) {
        if (month == 0) { return 11; } else { return month - 1; }
    }
    function getPrevYear(year, month) {
        if (month == 0) { return year - 1; } else { return year; }
    }


    var monthsNames = ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'];


    function draw(body, year, month) {
        body.textContent = ''; 

        var calendarInfo = document.querySelector('#calendar .info');
        calendarInfo.textContent = monthsNames[month] + ' ' + year;

        var arr = range(getLastDay(year, month));
        var firstWeekDay = getFirstWeekDay(year, month);
        var lastWeekDay  = getLastWeekDay(year, month);
        var nums = chunk(normalize(arr, firstWeekDay, 6 - lastWeekDay), 7);
        createTable(body, nums);
    }

    var calendar = document.getElementById('calendar');
    var body = calendar.querySelector('.body');
    var prev = calendar.querySelector('.prev');
    var next = calendar.querySelector('.next');

    var date  = new Date();
    var year  = date.getFullYear();
    var month = date.getMonth();

    draw(body, year, month);

    next.addEventListener('click', function(event) {
        event.preventDefault();
        year = getNextYear(year, month);
        month = getNextMonth(month);
        draw(body, year, month); 
    });

    prev.addEventListener('click', function(event) {
        event.preventDefault();
        year = getPrevYear(year, month);
        month = getPrevMonth(month);
        draw(body, year, month); 
    });
</script>

</body>
</html>
