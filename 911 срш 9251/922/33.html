<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title></title>
    <style>
.right {
	border: 2px solid green;
	outline: none;
}
.wrong {
	border: 2px solid red;
	outline: none;
}
    </style>
</head>
<body>
<div id="test"></div>
<button id="button">проверить ответы</button>
<script>
let questions = {
	'Как называется столица Японии?': 'Токио',
	'Сколько будет 5 в квадрате?': '25',
	'Кто придумал таблицу менделеева?': 'Менделеев',
};

let testContainer = document.querySelector('#test');
let button = document.querySelector('#button');

for (let question in questions) {
	let div = document.createElement('div');
	
	let p = document.createElement('p');
	p.textContent = question;
	div.appendChild(p);
	
	let input = document.createElement('input');
	input.dataset.right = questions[question]; 
	div.appendChild(input);
	
	testContainer.appendChild(div);
}

button.addEventListener('click', function() {
	let inputs = testContainer.querySelectorAll('input');
	
	for (let input of inputs) {
		let userAnswer = input.value.trim();
		let rightAnswer = input.dataset.right;
		
		input.classList.remove('right', 'wrong');
		
		if (userAnswer === rightAnswer) {
			input.classList.add('right');
		} else {
			input.classList.add('wrong');
		}
	}
});

</script>
</body>
</html>
