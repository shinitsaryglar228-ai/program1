<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
#field td {
	width: 50px;
	height: 50px;
	border: 1px solid black;
	text-align: center;
	font-weight: bold;
	cursor: pointer;
}

    </style>
</head>
<body>
<table id="field">
	<tr>
		<td></td>
		<td></td>
		<td></td>
	</tr>
	<tr>
		<td></td>
		<td></td>
		<td></td>
	</tr>
	<tr>
		<td></td>
		<td></td>
		<td></td>
	</tr>
</table>

    <script>
function start(cells) {
	let i = 0; 
	
	for (let cell of cells) {
		cell.addEventListener('click', function() {
			if (this.textContent === '') {
				if (i % 2 === 0) {
					this.textContent = 'X';
				} else {
					this.textContent = 'O';
				}
				
				i++; 
			}
		});
	}
}

let cells = document.querySelectorAll('#field td');
start(cells);
    </script>
</body>
</html>
