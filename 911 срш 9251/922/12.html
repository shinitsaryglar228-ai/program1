<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Спойлеры</title>
  <style>
    .spoiler:not(.active) {
      display: none;
    }

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: auto;
      line-height: 1.6;
    }

    .toggle {
      color: #2980b9; 
      text-decoration: none;
      cursor: pointer;
      font-weight: bold;
    }

    .toggle:hover {
      text-decoration: underline;
    }

    .spoiler {
      padding: 15px;
      margin-top: 10px;
      background-color: #f4f4f4;
      border-left: 4px solid #2980b9;
    }

    .toggle.collapsed::after {
      content: " ▼";
    }
    .toggle.expanded::after {
      content: " ▲"; 
    }
  </style>
</head>
<body>

<p>абзац с текстом</p>
<p>абзац с текстом <a href="#" class="toggle collapsed">развернуть спойлер 1</a></p>
<p class="spoiler">
  <strong>Скрытый спойлер 1:</strong>590-82034bn7v23-4mn7cm432mbv620-cijoywergtdfsnhoqw[ejt9043ut]
</p>
<p>абзац с текстом</p>
<p>абзац с текстом <a href="#" class="toggle collapsed">развернуть спойлер 2</a></p>
<p class="spoiler">
  <strong>Скрытый спойлер 2:</strong>drthjgfdjgfjrtuytrnrtnb
</p>
<p>абзац с текстом</p>

<script>
document.addEventListener('DOMContentLoaded', function() {

  const toggles = document.querySelectorAll('.toggle');

  toggles.forEach(toggle => {
    toggle.addEventListener('click', function(event) {
      event.preventDefault(); 

      const parentParagraph = this.parentElement; 
      const spoiler = parentParagraph.nextElementSibling; 

      if (spoiler && spoiler.classList.contains('spoiler')) {
        spoiler.classList.toggle('active');
        this.classList.toggle('collapsed');
        this.classList.toggle('expanded');
      }
    });
  });
});
</script>

</body>
</html>
