<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Аккордеон</title>
  <style>
    #parent {
      margin: 0 auto;
      width: 400px;
      font-family: Arial, sans-serif;
    }

    .tab {
      margin-bottom: 10px;
    }

    .tab .link a {
      display: block;
      padding: 10px;
      color: black;
      text-decoration: none;
      text-align: center;
      background: #f8f8f8;
      border: 1px solid gray;
    }

    .tab .link:hover a {
      background: #f2f2f2;
    }

    .tab:not(.active) .text {
      display: none;
    }

    .tab .text {
      border: 1px dashed gray;
      border-top: none; 
      padding: 10px;
      height: 300px;
    }
  </style>
</head>
<body>
<div id="parent">
  <div class="tab active">
    <div class="link">
      <a href="#">Вкладка 1</a>
    </div>
    <div class="text">
      <p> ueruyrtn7w45754376236m85765r.976 5ie58r</p>
    </div>
  </div>

  <div class="tab">
    <div class="link">
      <a href="#">Вкладка 2</a>
    </div>
    <div class="text">
      <p>dgfjertyw 346n3j6,w545 7w576w56yw34b6v</p>
    </div>
  </div>

  <div class="tab">
    <div class="link">
      <a href="#">Вкладка 3</a>
    </div>
    <div class="text">
      <p>fhkyiuj32q9518 9m8v9j4351=b743vmmutvc,8tm</p>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {

  const links = document.querySelectorAll('#parent .link a');

  links.forEach(link => {
    link.addEventListener('click', function(event) {
      event.preventDefault();
      const currentTab = this.closest('.tab');
      if (currentTab.classList.contains('active')) {
        currentTab.classList.remove('active');
        return; 
      }
      const currentlyActiveTab = document.querySelector('.tab.active');

      if (currentlyActiveTab && currentlyActiveTab !== currentTab) {
        currentlyActiveTab.classList.remove('active');
      }
      currentTab.classList.add('active');

    });
  });
});
</script>

</body>
</html>
