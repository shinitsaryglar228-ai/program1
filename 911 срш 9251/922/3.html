<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>104</title>
<script>
        let secret = Math.floor(Math.random() * 100) + 1;

        function check() {
            let user = +document.getElementById('num').value;
            let res = document.getElementById('res');

            if (user < secret) {
                res.innerText = 'введите число побольше';
            } else if (user > secret) {
                res.innerText = 'введите число поменьше';
            } else {
                res.innerText = 'Вы угадали!';
            }
        }
</script>
</head>
<body>
 <input type="number" id="num" placeholder="От 1 до 100">
    <button onclick="check()">Угадать</button>
    <p id="res">Попробуйте угадать!</p>
</body>
</html>
