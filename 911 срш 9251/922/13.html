<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вкладки (Табы)</title>
  <style>
    #parent {
      margin: 0 auto;
      width: 400px;
      font-family: Arial, sans-serif;
    }

    .menu a {
      margin-right: 5px;
      display: inline-block;
      padding: 10px;
      color: black;
      text-decoration: none;
      border: 1px solid gray;
      background-color: white; 
    }

    .menu a:hover {
      background: #f8f8f8;
    }

    .menu a.active {
      border-color: transparent;
      background: #f2f2f2;
    }

    .tabs .tab {
      padding: 10px;
      background: #f2f2f2;
      height: 300px;
      border: 1px solid gray;  
    }

    .tabs .tab:not(.active) {
      display: none;
    }
  </style>
</head>
<body>
<div id="parent">
  <div class="menu">
    <a href="" class="active">Вкладка 1</a>
    <a href="">Вкладка 2</a>
    <a href="">Вкладка 3</a>
  </div>

  <div class="tabs">
    <div class="tab active">
      <p> tdsrhjp]osjr]o]argdlbmbmsmq9=43iu512iu59=uh</p>
    </div>
    <div class="tab">
      <p>rgdsagj[aiwejtagn'd;ajbweo[twgdng[agnq[t0231u5</p>
    </div>
    <div class="tab">
      <p>xdgfhgfdhgdfhjgfdjdgfjgfdjgdfjdgfjdgfaweradsfds hdsf</p>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const links = document.querySelectorAll('.menu a');
  const tabs = document.querySelectorAll('.tab');
  links.forEach((link, index) => {
    link.addEventListener('click', function(event) {
      event.preventDefault();
      links.forEach(lnk => lnk.classList.remove('active'));
      tabs.forEach(tab => tab.classList.remove('active'));
      this.classList.add('active');
      tabs[index].classList.add('active');

    });
  });
});
</script>

</body>
</html>
