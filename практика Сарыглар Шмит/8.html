<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Исторические события</title>
  <style>
    * {
      box-sizing: border-box;
    }
    #parent {
      margin: 0 auto;
      width: 600px;
    }
    #input {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 16px;
    }
    #table {
      width: 100%;
      border-collapse: collapse;
    }
    #table td {
      padding: 10px;
      text-align: center;
      border: 1px solid black;
    }
   
    #table th {
      padding: 12px;
      text-align: center;
      border: 1px solid black;
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>

<div id="parent">
  <input id="input" placeholder="введите год и нажмите Enter">
  <table id="table"></table>
</div>

<script>

  const events = {
    2000: [
      {
        date: '1 января',
        title: 'Введение евро',
        description: 'В безналичных расчетах введены банкноты и монеты евро.'
      },
      {
        date: '10 октября',
        title: 'Запуск МКС',
        description: 'На орбиту выведен первый модуль Международной космической станции.'
      }
    ],
    2001: [
      {
        date: '11 сентября',
        title: 'Теракты в США',
        description: 'Серия террористических актов, совершённых в Нью-Йорке и Вашингтоне.'
      }
    ],
    2002: [
      {
        date: '25 мая',
        title: 'Финал ЧМ по футболу',
        description: 'Бразилия в пятый раз стала чемпионом мира.'
      }
    ]
  };

  const input = document.getElementById('input');
  const table = document.getElementById('table');

  input.addEventListener('keydown', function(event) {

    if (event.key === 'Enter') {

      table.innerHTML = '';

      const year = parseInt(input.value.trim());

      if (isNaN(year) || !events.hasOwnProperty(year)) {

         const row = table.insertRow();
         const cell = row.insertCell();
         cell.colSpan = 3; 
         cell.textContent = 'Событий за этот год не найдено.';
         return; 
       }

       const header = table.createTHead();
       const headerRow = header.insertRow();
       ['Дата', 'Событие', 'Описание'].forEach(text => {
         const th = document.createElement('th');
         th.textContent = text;
         headerRow.appendChild(th);
       });

       events[year].forEach(eventItem => {
         const row = table.insertRow();
         row.insertCell().textContent = eventItem.date;
         row.insertCell().textContent = eventItem.title;
         row.insertCell().textContent = eventItem.description;
       });
    }
  });
</script>

</body>
</html>
