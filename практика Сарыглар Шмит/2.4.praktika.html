<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
    <input id="n4_1"> <input id="n4_2">
<button id="btn4">Общие делители</button>
<p id="res4"></p>
<script>
let btn4 = document.querySelector('#btn4');
btn4.onclick = function() {
    let a = Number(document.querySelector('#n4_1').value);
    let b = Number(document.querySelector('#n4_2').value);
    let out = '';
    for (let i = 1; i <= a; i++) {
        if (a % i == 0 && b % i == 0) {
            out = out + i + ' ';
        }
    }
    document.querySelector('#res4').textContent = 'Общие: ' + out;
};
</script>

</body>
</html>
</body>
</html>
