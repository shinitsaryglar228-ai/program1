<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="jquery-4.0.0.min.js"></script>
    <style>
        p { padding: 8px; border: 1px solid #ccc; cursor: pointer; width: 200px; margin: 10px 0; }
        p:hover { background: #e6f2ff; }
    </style>
</head>
<body>
<p>Первый абзац</p>
<p>Второй абзац</p>
<p>Третий абзац</p>

<script>
$(function() {
    $('p').click(function() {
        alert($(this).text());
    });
});
</script>
</body>
</html>
