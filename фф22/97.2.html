<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        input { padding: 8px; margin: 5px 0; display: block; width: 250px; }
        #test { 
            margin-top: 15px; padding: 12px; background: #f8f9fa; 
            border: 1px solid #dee2e6; font-weight: bold; min-height: 20px;
        }
    </style>
</head>
<body>
    <input type="text" placeholder="Введите текст 1">
    <input type="text" placeholder="Введите текст 2">
    <input type="text" placeholder="Введите текст 3">
    
    <p id="test">Здесь появится значение...</p>

    <script>
    $(function() {
        $('input').blur(function() {
            $('#test').text($(this).val());
        });
    });
    </script>
</body>
</html>
