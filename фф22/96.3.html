<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="jquery-4.0.0.min.js"></script>
    <style>
        p { padding: 8px; border: 1px solid #ccc; cursor: pointer; width: 100px; text-align: center; margin: 10px 0; }
        p:hover { background: #ffe6e6; }
    </style>
</head>
<body>
<p>3</p>
<p>5</p>
<p>10</p>

<script>
$(function() {
    $('p').click(function() {
        let num = parseFloat($(this).text());
        if (!isNaN(num)) {
            $(this).text(num * num);
        }
    });
});
</script>
</body>
</html>
