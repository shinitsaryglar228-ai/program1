<script>
function isPrime(num) {
	if (num < 2) return false; 

	for (let i = 2; i < num; i++) {
		if (num % i === 0) {
			return false;
		}
	}
	
	return true; 
}

console.log(isPrime(13)); 
console.log(isPrime(9)); 
    </script>
