<title>104</title>
<script>
function func(num) {
	let res = [];
	
	for (let i = 1; i <= num; i++) {
		if (num % i === 0) {
			res.push(i);
		}
	}
	
	return res;
}

console.log( func(12)); 
console.log( func(7)); 
    </script>
